name: Build Windows Installer

# Builds the Histometer Windows installer (.exe + .msi) in the cloud on a
# GitHub-hosted Windows runner that already has Rust, the MSVC toolchain and
# Node.js installed. Nobody needs any compilers on their own machine: you run
# this workflow, wait a few minutes, and download a ready-to-run installer.
#
# Two ways to trigger it:
#
#   1. Actions tab -> "Build Windows Installer" -> "Run workflow"
#      The installers are attached to that run as downloadable artifacts.
#
#   2. Push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`)
#      A GitHub Release is created with the installers attached, giving you a
#      permanent public download page you can share.

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

# Never let two builds of the same ref run at once.
concurrency:
  group: installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      # Needed so the release step can create/update a GitHub Release.
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # tauri-action runs `npm run tauri build`, which compiles the Rust shell
      # and bundles the NSIS `.exe` and `.msi` installers. When `tagName` is
      # non-empty (i.e. this run was triggered by a version tag) it also
      # publishes a GitHub Release with the installers attached.
      - name: Build the app and (on a tag) publish a Release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "Histometer ${{ github.ref_name }}"
          releaseBody: |
            Windows installer for Histometer.

            Download `Histometer_*_x64-setup.exe` (recommended) or the `.msi`,
            run it, and launch Histometer from the Start menu. No Node.js, Rust
            or build tools are required on the target machine.
          releaseDraft: false
          prerelease: false

      # Always expose the installers as workflow artifacts, so a manual
      # ("Run workflow") build without a tag still produces a download.
      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: histometer-windows-installer
          if-no-files-found: error
          retention-days: 30
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
